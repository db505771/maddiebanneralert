<style>

html,
body{

.page{

  justify-content: center;

}

/* SYSTEM NOTIFICATION BANNER */

.insightBanner {
  background: #111;

  border-radius: 12px;

<body>

<div class="page">

  <!-- Dynamic Habits Alert Banner -->
  <div class="insightBanner" id="insightBanner" style="display: none;">
    <div class="insightIcon" id="insightIcon"></div>
    <div class="insightContent">
      <div class="insightTitle" id="insightTitle"></div>
      <div class="insightDesc" id="insightDesc"></div>
    </div>
  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycby5tKKny4hqGyG--JQxP4IVe2C8WWGO6sMij6p66MdSmLFVDUn6TbeBbM2L51TdWia_/exec";

let games = [];

// ⚡ Load instantly from local storage cache if it exists
const cachedData = localStorage.getItem("roblox_games_cache");
if (cachedData) {
  try {
    games = JSON.parse(cachedData);
    processInsights();
  } catch(e) {}
}

async function loadGames(){
  try {
    const res = await fetch(API);
    games = await res.json();
    
    // Update cache with fresh data
    localStorage.setItem("roblox_games_cache", JSON.stringify(games));
    
    processInsights();
  } catch (err) {
    console.error("Failed to fetch game data:", err);
  }
}

/* 🔥 LOCAL TIME-ZONE CORRECTED STREAK ENGINE */
function calculateStreaks() {
  const streaks = {};
  
  const toLocalISO = (dateObj) => {
    const offset = dateObj.getTimezoneOffset();
    const localDate = new Date(dateObj.getTime() - (offset * 60 * 1000));
    return localDate.toISOString().split('T')[0];
  };

  const todayStr = toLocalISO(new Date());
  
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = toLocalISO(yesterday);

  const gameDates = {};
  games.forEach(g => {
    if (!g.date) return;
    const dateStr = toLocalISO(new Date(g.date));
    if (!gameDates[g.id]) {
      gameDates[g.id] = new Set();
    }
    gameDates[g.id].add(dateStr);
  });

  Object.keys(gameDates).forEach(id => {
    let currentStreak = 0;
    let checkDate = new Date();

    if (!gameDates[id].has(todayStr)) {
      if (gameDates[id].has(yesterdayStr)) {
        checkDate = new Date(yesterday.getTime());
      } else {
        streaks[id] = 0;
        return;
      }
    }

    while (true) {
      const checkStr = toLocalISO(checkDate);
      if (gameDates[id].has(checkStr)) {
        currentStreak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else {
        break;
      }
    }
    streaks[id] = currentStreak;
  });

  return streaks;
}

/* 🧠 WEEK/DAY ANALYSIS BANNER LOGIC */
function processInsights() {
  const banner = document.getElementById("insightBanner");
  const bIcon = document.getElementById("insightIcon");
  const bTitle = document.getElementById("insightTitle");
  const bDesc = document.getElementById("insightDesc");

  const toLocalISO = (dateObj) => {
    const offset = dateObj.getTimezoneOffset();
    const localDate = new Date(dateObj.getTime() - (offset * 60 * 1000));
    return localDate.toISOString().split('T')[0];
  };

  const todayStr = toLocalISO(new Date());
  const streaks = calculateStreaks();

  // 1. GATHER DATA (Look primarily at today and this week for patterns)
  const todaySessions = games.filter(g => g.date && toLocalISO(new Date(g.date)) === todayStr);
  const weekSessions = games.filter(g => {
    if (!g.date) return false;
    const diff = (new Date() - new Date(g.date)) / (1000 * 60 * 60 * 24);
    return diff <= 7;
  });

  // Check 1: Game Hopping (ADHD Warning) - Tracked by the DAY
  if (todaySessions.length >= 3) {
    // Sort chronological (oldest to newest today)
    const sortedToday = [...todaySessions].sort((a, b) => new Date(a.date) - new Date(b.date));
    const bounceCounter = {};
    let lastGameId = null;

    sortedToday.forEach(entry => {
      if (lastGameId && lastGameId !== entry.id) {
        if (!bounceCounter[entry.id]) {
          bounceCounter[entry.id] = { count: 0, totalMinutes: 0 };
        }
        bounceCounter[entry.id].count += 1;
        bounceCounter[entry.id].totalMinutes += entry.minutes;
      } else if (!lastGameId) {
        bounceCounter[entry.id] = { count: 1, totalMinutes: entry.minutes };
      } else {
        bounceCounter[entry.id].totalMinutes += entry.minutes;
      }
      lastGameId = entry.id;
    });

    for (const id in bounceCounter) {
      const stats = bounceCounter[id];
      const match = games.find(g => g.id === id);
      // Played game at least twice today in separate sessions, averaging under 20 mins per play
      if (stats.count >= 2 && (stats.totalMinutes / stats.count) <= 20 && match) {
        banner.className = "insightBanner warning";
        bIcon.innerText = "🔄";
        bTitle.innerText = "Getting bored?";
        bDesc.innerHTML = `You've repeatedly showed signs of boredom and major interest in <strong>${match.name}</strong> . Consider taking a day/week break to avoid getting bored!`;
        banner.style.display = "flex";
        return; // Prioritize warnings first
      }
    }
  }

  // Check 2: Hyperfocus Phase - Tracked by the WEEK (Active Streak >= 3 days OR Week Playtime > 8 hours)
  const weeklyAggregated = {};
  weekSessions.forEach(g => {
    if (!weeklyAggregated[g.id]) {
      weeklyAggregated[g.id] = 0;
    }
    weeklyAggregated[g.id] += g.minutes;
  });

  for (const id in weeklyAggregated) {
    const totalMins = weeklyAggregated[id];
    const streak = streaks[id] || 0;
    const match = games.find(g => g.id === id);

    if ((streak >= 3 || totalMins >= 480) && match) {
      banner.className = "insightBanner hype";
      bIcon.innerText = "🔥";
      bTitle.innerText = "In a phase?";
      bDesc.innerHTML = `You show signs of interest in the game <strong>${match.name}</strong> . This week with ${Math.floor(totalMins / 60)}h logged and a general streak of <strong>${streak}days</strong>!`;
      banner.style.display = "flex";
      return;
    }
  }

  // Default state: Hide banner if there are no strong active warnings or hypes
  banner.style.display = "none";
}

loadGames();
setInterval(loadGames, 60000);

</script>

</body>
