<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0,
    user-scalable=no
  "
/>

<title>Playtime Insights Banner</title>

<style>

html,
body{
  margin:0;
  width:100%;
  height:100%;

  overflow:hidden;

  background: transparent; /* Made background transparent */
  color:white;

  font-family:Arial, sans-serif;
}

/* PAGE */

.page{
  padding:0;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
}

/* SYSTEM NOTIFICATION BANNER */

.insightBanner {
  background: rgba(17, 17, 17, 0.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 6px;
  padding: 4px 10px; 
  display: flex;
  align-items: center; 
  transition: all 0.3s ease;
  animation: slideIn 0.4s ease-out;
  
  /* Exact dimensions */
  width: 398px;
  height: 41px;
  box-sizing: border-box;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Banner States */
.insightBanner.warning {
  border-color: rgba(245, 158, 11, 0.4);
  background: rgba(245, 158, 11, 0.12);
}

.insightBanner.hype {
  border-color: rgba(139, 92, 246, 0.4);
  background: rgba(139, 92, 246, 0.12);
}

/* Neutral state when no patterns are found */
.insightBanner.normal {
  border-color: rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.05);
}

.insightContent {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center; /* Centers items horizontally inside the banner */
  gap: 8px; 
  overflow: hidden;
  white-space: nowrap;
}

.insightTitle {
  font-size: 11.5px;
  font-weight: bold;
  flex-shrink: 0;
}

.insightBanner.warning .insightTitle { color: #f59e0b; }
.insightBanner.hype .insightTitle { color: #a78bfa; }
.insightBanner.normal .insightTitle { color: #aaa; } /* Muted title for neutral pattern state */

.insightDesc {
  font-size: 11px;
  color: #ccc;
  white-space: nowrap;
}

.insightDesc strong {
  color: #ffffff;
}

</style>
</head>

<body>

<div class="page">

  <div class="insightBanner" id="insightBanner" style="display: none;">
    <div class="insightContent" id="insightContent">
      <div class="insightTitle" id="insightTitle"></div>
      <div class="insightDesc" id="insightDesc"></div>
    </div>
  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycby5tKKny4hqGyG--JQxP4IVe2C8WWGO6sMij6p66MdSmLFVDUn6TbeBbM2L51TdWia_/exec";

let games = [];

// Load instantly from local storage cache if it exists
const cachedData = localStorage.getItem("roblox_games_cache");
if (cachedData) {
  try {
    games = JSON.parse(cachedData);
    processInsights();
  } catch(e) {}
}

async function loadGames(){
  try {
    const res = await fetch(API);
    games = await res.json();
    
    // Update cache with fresh data
    localStorage.setItem("roblox_games_cache", JSON.stringify(games));
    
    processInsights();
  } catch (err) {
    console.error("Failed to fetch game data:", err);
  }
}

/* LOCAL TIME-ZONE CORRECTED STREAK ENGINE */
function calculateStreaks() {
  const streaks = {};
  
  const toLocalISO = (dateObj) => {
    const offset = dateObj.getTimezoneOffset();
    const localDate = new Date(dateObj.getTime() - (offset * 60 * 1000));
    return localDate.toISOString().split('T')[0];
  };

  const todayStr = toLocalISO(new Date());
  
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = toLocalISO(yesterday);

  const gameDates = {};
  games.forEach(g => {
    if (!g.date) return;
    const dateStr = toLocalISO(new Date(g.date));
    if (!gameDates[g.id]) {
      gameDates[g.id] = new Set();
    }
    gameDates[g.id].add(dateStr);
  });

  Object.keys(gameDates).forEach(id => {
    let currentStreak = 0;
    let checkDate = new Date();

    if (!gameDates[id].has(todayStr)) {
      if (gameDates[id].has(yesterdayStr)) {
        checkDate = new Date(yesterday.getTime());
      } else {
        streaks[id] = 0;
        return;
      }
    }

    while (true) {
      const checkStr = toLocalISO(checkDate);
      if (gameDates[id].has(checkStr)) {
        currentStreak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else {
        break;
      }
    }
    streaks[id] = currentStreak;
  });

  return streaks;
}

/* 🔄 AUTO FONT-SIZE CALCULATOR ENGINE */
function adjustFontSize() {
  const container = document.getElementById("insightBanner");
  const content = document.getElementById("insightContent");
  const title = document.getElementById("insightTitle");
  const desc = document.getElementById("insightDesc");

  // Reset to default sizes before calculation loop
  title.style.fontSize = "11.5px";
  desc.style.fontSize = "11px";

  // Available width inside banner minus padding bounds (10px left + 10px right)
  const maxAvailableWidth = container.clientWidth - 20; 
  
  let currentTitleSize = 11.5;
  let currentDescSize = 11;

  // Scale fonts down smoothly until width boundaries fit exactly
  while (content.scrollWidth > maxAvailableWidth && currentDescSize > 7) {
    currentTitleSize -= 0.25;
    currentDescSize -= 0.25;
    title.style.fontSize = currentTitleSize + "px";
    desc.style.fontSize = currentDescSize + "px";
  }
}

/* WEEK/DAY ANALYSIS BANNER LOGIC */
function processInsights() {
  const banner = document.getElementById("insightBanner");
  const bTitle = document.getElementById("insightTitle");
  const bDesc = document.getElementById("insightDesc");

  if (!games || games.length === 0) {
    banner.style.display = "none";
    return;
  }

  const toLocalISO = (dateObj) => {
    const offset = dateObj.getTimezoneOffset();
    const localDate = new Date(dateObj.getTime() - (offset * 60 * 1000));
    return localDate.toISOString().split('T')[0];
  };

  const todayStr = toLocalISO(new Date());
  const streaks = calculateStreaks();

  // 1. GATHER DATA (Look primarily at today and this week for patterns)
  const todaySessions = games.filter(g => g.date && toLocalISO(new Date(g.date)) === todayStr);
  const weekSessions = games.filter(g => {
    if (!g.date) return false;
    const diff = (new Date() - new Date(g.date)) / (1000 * 60 * 60 * 24);
    return diff <= 7;
  });

  // Check 1: Game Hopping (ADHD Warning) - Tracked by the DAY
  if (todaySessions.length >= 3) {
    const sortedToday = [...todaySessions].sort((a, b) => new Date(a.date) - new Date(b.date));
    const bounceCounter = {};
    let lastGameId = null;

    sortedToday.forEach(entry => {
      if (lastGameId && lastGameId !== entry.id) {
        if (!bounceCounter[entry.id]) {
          bounceCounter[entry.id] = { count: 0, totalMinutes: 0 };
        }
        bounceCounter[entry.id].count += 1;
        bounceCounter[entry.id].totalMinutes += entry.minutes;
      } else if (!lastGameId) {
        bounceCounter[entry.id] = { count: 1, totalMinutes: entry.minutes };
      } else {
        bounceCounter[entry.id].totalMinutes += entry.minutes;
      }
      lastGameId = entry.id;
    });

    for (const id in bounceCounter) {
      const stats = bounceCounter[id];
      const match = games.find(g => g.id === id);
      if (stats.count >= 2 && (stats.totalMinutes / stats.count) <= 20 && match) {
        banner.className = "insightBanner warning";
        bTitle.innerText = "Getting bored";
        bDesc.innerHTML = `in <strong>${match.name}</strong>. Take a quick break!`;
        banner.style.display = "flex";
        adjustFontSize();
        return;
      }
    }
  }

  // Check 2: Hyperfocus Phase - Tracked by the WEEK
  const weeklyAggregated = {};
  weekSessions.forEach(g => {
    if (!weeklyAggregated[g.id]) {
      weeklyAggregated[g.id] = 0;
    }
    weeklyAggregated[g.id] += g.minutes;
  });

  for (const id in weeklyAggregated) {
    const totalMins = weeklyAggregated[id];
    const streak = streaks[id] || 0;
    const match = games.find(g => g.id === id);

    if ((streak >= 3 || totalMins >= 480) && match) {
      banner.className = "insightBanner hype";
      bTitle.innerText = "In a phase";
      bDesc.innerHTML = `on <strong>${match.name}</strong> with ${Math.floor(totalMins / 60)}h played with a <strong>${streak} day</strong> streak!`;
      banner.style.display = "flex";
      adjustFontSize();
      return;
    }
  }

  // Default state: Displays cleanly when no unusual gameplay habits are caught
  banner.className = "insightBanner normal";
  bTitle.innerText = "Good job!";
  bDesc.innerHTML = "No unusual patterns detected today.";
  banner.style.display = "flex";
  adjustFontSize();
}

loadGames();
setInterval(loadGames, 60000);

</script>

</body>
</html>
